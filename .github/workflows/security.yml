name: Supply-chain security

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "07 5 * * 1"

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Install project and security tools
        run: |
          if [ -f uv.lock ]; then
            uv sync --all-extras --dev || uv sync --dev
            uv pip install bandit pip-audit cyclonedx-bom
          else
            python -m pip install -e ".[dev]" bandit pip-audit cyclonedx-bom
          fi
      - name: Ruff
        run: |
          if grep -q '^\[tool\.ruff' pyproject.toml; then
            if [ -f uv.lock ]; then uv run ruff check .; else ruff check .; fi
          fi
      - name: Tests
        run: |
          if [ -f uv.lock ]; then uv run pytest -q; else pytest -q; fi
      - name: Bandit
        # Gate on medium+ severity. The only findings are low-severity false
        # positives in scientific code: seeded random.Random for Monte-Carlo
        # (B311), a ReadinessStatus.PASS = "pass" enum value (B105), and
        # try/except/continue blocks that intentionally skip missing registry
        # records (B112). Medium/high issues still fail the build.
        run: |
          if [ -f uv.lock ]; then uv run bandit -r src -x tests --severity-level medium; else bandit -r src -x tests --severity-level medium; fi
      - name: pip-audit
        run: |
          if [ -f uv.lock ]; then uv run pip-audit --desc; else pip-audit --desc; fi
      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p artifacts
          if [ -f uv.lock ]; then
            uv run cyclonedx-py environment --output-format JSON --output-file artifacts/python-sbom.cdx.json
          else
            cyclonedx-py environment --output-format JSON --output-file artifacts/python-sbom.cdx.json
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-sbom
          path: artifacts/python-sbom.cdx.json
          if-no-files-found: error

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      # Run the gitleaks CLI directly rather than gitleaks-action, which requires a
      # paid GITLEAKS_LICENSE for organization-owned repos. The CLI binary is free.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          archive="/tmp/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --proto '=https' --tlsv1.2 --fail --show-error --location \
            --output "${archive}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${archive}" | sha256sum --check --strict -
          tar -xzf "${archive}" -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose

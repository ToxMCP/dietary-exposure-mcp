name: Semgrep SAST

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install semgrep==1.167.0
      # Free Semgrep registry rulesets (no GHAS / no SARIF upload required):
      #   p/python  = Python security + correctness
      #   p/secrets = hardcoded credentials
      # `--error` gates the job by exiting non-zero on any blocking finding.
      - name: Semgrep scan
        run: semgrep scan --config p/python --config p/secrets --error --metrics=off src/dietary_mcp

name: Semgrep SAST

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install Semgrep
        run: pip install semgrep==1.167.0
      # Free Semgrep registry rulesets (no GHAS / no SARIF upload required):
      #   p/python  = Python security + correctness
      #   p/secrets = hardcoded credentials
      # `--error` gates the job by exiting non-zero on any blocking finding.
      - name: Semgrep scan
        run: semgrep scan --config p/python --config p/secrets --error --metrics=off src/dietary_mcp
